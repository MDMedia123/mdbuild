<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status - MD Build</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="md_media_config.js"></script>
  <style>
    :root {
      --ink: #1a1410;
      --ink-soft: #5a5248;
      --paper: #fafaf8;
      --paper-dark: #f5f3f0;
      --gold: #C1893D;
      --gold-dark: #9d6e2f;
      --border-light: #f0ede1;
      --gray-text: #8a827a;
      --red: #d64545;
      --green: #2f8577;
      --yellow: #e8b923;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--paper);
      color: var(--ink);
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }

    .header {
      background: var(--paper-dark);
      border-bottom: 1px solid var(--border-light);
      padding: 24px 0;
      margin: -20px -20px 32px;
      padding: 24px 20px;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-link {
      text-decoration: none;
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }

    .logo-link:hover {
      opacity: 0.7;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--gray-text);
      margin-bottom: 32px;
    }

    .search-section {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 14px;
      color: var(--ink);
      background: white;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(193, 137, 61, 0.1);
    }

    .search-button {
      background: var(--gold);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 8px;
    }

    .search-button:hover:not(:disabled) {
      background: var(--gold-dark);
    }

    .search-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-card {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .status-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
    }

    .status-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.pending {
      background: rgba(232, 185, 35, 0.1);
      color: var(--yellow);
    }

    .status-badge.completed {
      background: rgba(47, 133, 119, 0.1);
      color: var(--green);
    }

    .status-badge.processing {
      background: rgba(193, 137, 61, 0.1);
      color: var(--gold);
    }

    .status-timeline {
      margin-bottom: 24px;
    }

    .timeline-step {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      position: relative;
    }

    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 19px;
      top: 40px;
      width: 2px;
      height: 20px;
      background: var(--border-light);
    }

    .timeline-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--paper-dark);
      border: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .timeline-step.completed .timeline-dot {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .timeline-step.active .timeline-dot {
      background: var(--gold);
      border-color: var(--gold);
      color: white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(193, 137, 61, 0.7); }
      50% { box-shadow: 0 0 0 8px rgba(193, 137, 61, 0); }
    }

    .timeline-content {
      flex: 1;
      padding-top: 4px;
    }

    .timeline-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .timeline-date {
      font-size: 12px;
      color: var(--gray-text);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
    }

    .detail-item {
      flex: 1;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 14px;
      color: var(--ink);
      font-weight: 500;
    }

    .action-button {
      background: var(--gold);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-block;
      text-decoration: none;
      margin-top: 20px;
    }

    .action-button:hover {
      background: var(--gold-dark);
    }

    .error-message {
      background: rgba(214, 69, 69, 0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border-light);
      border-top: 3px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-text);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .details-grid {
        grid-template-columns: 1fr;
      }

      .status-header {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="MD_Media_Home.html" class="logo-link">← MD BUILD</a>
  </div>
</div>

<div class="container">
  <h1>Order Status</h1>
  <p class="subtitle">Check your order status and access your purchase</p>

  <div class="search-section">
    <div class="form-group">
      <label class="form-label">Order ID or Email</label>
      <input type="text" id="searchInput" class="form-input" placeholder="Enter your Order ID (e.g., 171f54c6...) or email" required>
    </div>
    <button id="searchButton" class="search-button">Search Order</button>
    <div class="error-message" id="errorMessage"></div>
  </div>

  <div id="orderDisplay"></div>
</div>

<script>
  const searchButton = document.getElementById('searchButton');
  const searchInput = document.getElementById('searchInput');
  const errorMessage = document.getElementById('errorMessage');
  const orderDisplay = document.getElementById('orderDisplay');

  // Check for order ID in URL params
  const params = new URLSearchParams(window.location.search);
  const urlOrderId = params.get('order');
  if (urlOrderId) {
    searchInput.value = urlOrderId;
    loadOrder(urlOrderId);
  }

  searchButton.addEventListener('click', () => {
    const query = searchInput.value.trim();
    if (!query) {
      showError('Please enter an Order ID or email');
      return;
    }
    loadOrder(query);
  });

  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchButton.click();
    }
  });

  async function loadOrder(query) {
    searchButton.disabled = true;
    searchButton.innerHTML = '<div class="loading-spinner"></div>';
    errorMessage.classList.remove('show');
    orderDisplay.innerHTML = '';

    try {
      // Try to find order by ID or email
      let order;

      if (query.includes('@')) {
        // Search by email
        const { data, error } = await mdSupabase
          .from('orders')
          .select('*')
          .eq('customer_email', query)
          .order('created_at', { ascending: false })
          .limit(1);

        if (error) throw error;
        order = data?.[0];
      } else {
        // Search by order ID (full or partial)
        const { data, error } = await mdSupabase
          .from('orders')
          .select('*')
          .or(`id.ilike.%${query}%`);

        if (error) throw error;
        order = data?.[0];
      }

      if (!order) {
        showError('Order not found. Please check your Order ID or email address.');
        orderDisplay.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <p>No order found matching your search.</p>
            <p style="font-size: 13px; margin-top: 16px;">Check your Order ID in your confirmation email or use the email address you provided at checkout.</p>
          </div>
        `;
        return;
      }

      displayOrder(order);
    } catch (err) {
      showError(err.message || 'An error occurred. Please try again.');
    } finally {
      searchButton.disabled = false;
      searchButton.innerHTML = 'Search Order';
    }
  }

  function displayOrder(order) {
    const productNames = {
      'business-launch': 'MD Business Launch™',
      'studios': 'MD Studios™'
    };

    const productName = productNames[order.product_slug] || order.product_slug;
    const amount = (order.amount_cents / 100).toFixed(2);
    const createdDate = new Date(order.created_at);
    const statusLabel = order.status.charAt(0).toUpperCase() + order.status.slice(1);
    const statusBadgeClass = order.status === 'completed' ? 'completed' : order.status === 'pending' ? 'pending' : 'processing';

    const timeline = getTimeline(order.status, createdDate);

    orderDisplay.innerHTML = `
      <div class="status-card">
        <div class="status-header">
          <h2 class="status-title">${productName}</h2>
          <span class="status-badge ${statusBadgeClass}">${statusLabel}</span>
        </div>

        <div class="status-timeline">
          ${timeline}
        </div>

        <div class="details-grid">
          <div class="detail-item">
            <div class="detail-label">Order ID</div>
            <div class="detail-value" style="font-family: monospace;">${order.id}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Amount</div>
            <div class="detail-value">$${amount}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Email</div>
            <div class="detail-value">${order.customer_email}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Customer Name</div>
            <div class="detail-value">${order.customer_name}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Order Date</div>
            <div class="detail-value">${createdDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Status</div>
            <div class="detail-value" style="color: ${order.status === 'completed' ? 'var(--green)' : 'var(--yellow)'}">${statusLabel}</div>
          </div>
        </div>

        ${order.status === 'completed' ? `
          <a href="MD_Customer_Portal.html?order=${order.id}" class="action-button">
            Access Your Product →
          </a>
        ` : `
          <div style="margin-top: 24px; padding: 16px; background: var(--paper); border-radius: 8px; color: var(--gray-text); font-size: 13px;">
            <strong>Next Steps:</strong> Your order is being processed. You'll receive a confirmation email once payment is complete. If you have any questions, please contact support@mdbuild.com
          </div>
        `}
      </div>
    `;
  }

  function getTimeline(status, createdDate) {
    const steps = [
      { label: 'Order Placed', completed: true },
      { label: 'Payment Processing', completed: status !== 'pending' },
      { label: 'Ready to Access', completed: status === 'completed' }
    ];

    return steps.map((step, idx) => {
      const isActive = (status === 'pending' && idx === 1) || (status !== 'completed' && idx === 2);
      const isCompleted = step.completed;
      const stepClass = isCompleted ? 'completed' : isActive ? 'active' : '';

      return `
        <div class="timeline-step ${stepClass}">
          <div class="timeline-dot">${isCompleted ? '✓' : idx + 1}</div>
          <div class="timeline-content">
            <div class="timeline-label">${step.label}</div>
            <div class="timeline-date">${isCompleted ? 'Completed' : isActive ? 'In progress' : 'Pending'}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add('show');
  }
</script>

</body>
</html>
