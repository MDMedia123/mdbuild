<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - MD Build</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="md_media_config.js"></script>
  <style>
    :root {
      --ink: #1a1410;
      --ink-soft: #5a5248;
      --paper: #fafaf8;
      --paper-dark: #f5f3f0;
      --gold: #C1893D;
      --gold-dark: #9d6e2f;
      --border-light: #f0ede1;
      --gray-text: #8a827a;
      --red: #d64545;
      --green: #2f8577;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--paper);
      color: var(--ink);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .header {
      background: var(--paper-dark);
      border-bottom: 1px solid var(--border-light);
      padding: 16px 0;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-link {
      text-decoration: none;
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }

    .logo-link:hover {
      opacity: 0.7;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      margin-bottom: 32px;
    }

    .order-summary {
      padding: 24px;
      background: var(--paper-dark);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      height: fit-content;
    }

    .product-card {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
    }

    .product-card:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 13px;
      color: var(--gray-text);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
    }

    .price-breakdown {
      font-size: 13px;
      color: var(--gray-text);
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .price-row.total {
      font-weight: 600;
      color: var(--ink);
      font-size: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }

    .checkout-form {
      max-width: 500px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      line-height: 1.2;
    }

    .form-subtitle {
      font-size: 14px;
      color: var(--gray-text);
      margin-bottom: 32px;
      font-weight: 500;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--ink);
      background: white;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .form-input::placeholder {
      color: var(--gray-text);
    }

    .submit-btn {
      width: 100%;
      padding: 12px 16px;
      background: var(--gold);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 24px;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--gold-dark);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      color: var(--red);
      font-size: 13px;
      margin-top: 8px;
      padding: 12px;
      background: rgba(214, 69, 69, 0.08);
      border-radius: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: var(--green);
      font-size: 13px;
      margin-top: 8px;
      padding: 12px;
      background: rgba(47, 133, 119, 0.08);
      border-radius: 6px;
      display: none;
      line-height: 1.8;
    }

    .success-message.show {
      display: block;
    }

    .login-link {
      text-align: center;
      font-size: 13px;
      margin-top: 24px;
    }

    .login-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-link a:hover {
      color: var(--gold-dark);
    }

    .processing {
      display: none;
      text-align: center;
      padding: 24px;
      color: var(--gray-text);
    }

    .processing.show {
      display: block;
    }

    @media (max-width: 768px) {
      .checkout-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="MD_Media_Home.html" class="logo-link">← MD BUILD</a>
  </div>
</div>

<div class="container">
  <div class="checkout-grid">
    <!-- Order Summary -->
    <div class="order-summary">
      <div class="product-card" id="productCard">
        <!-- Populated by JavaScript -->
      </div>

      <div class="price-breakdown">
        <div class="price-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="price-row total">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
      </div>
    </div>

    <!-- Checkout Form -->
    <div class="checkout-form">
      <h1>Checkout</h1>
      <p class="form-subtitle">Enter your details to complete your purchase</p>

      <form id="checkoutForm">
        <!-- Customer Info Section -->
        <div class="form-section">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-section">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullName" class="form-input" placeholder="Jane Smith" required>
        </div>

        <!-- Error Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Processing State -->
        <div class="processing" id="processingState">
          <p>Creating your order...</p>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn">Complete Order</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="MD_Customer_Portal.html">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Product Configuration
  const PRODUCTS = {
    'business-launch': {
      id: 'business-launch',
      name: 'MD Business Launch™',
      description: 'A guided, 21-module path from idea to launch-ready business',
      price: 4900,
      displayPrice: '$49'
    },
    'studios': {
      id: 'studios',
      name: 'MD Studios™',
      description: 'Creative brand & design workspace',
      price: 24900,
      displayPrice: '$249'
    }
  };

  let productId, productData;

  async function init() {
    const params = new URLSearchParams(window.location.search);
    productId = params.get('product') || 'business-launch';
    productData = PRODUCTS[productId];

    if (!productData) {
      showError('Product not found');
      return;
    }

    displayProduct();
    document.getElementById('checkoutForm').addEventListener('submit', handleSubmit);
  }

  function displayProduct() {
    const productCard = document.getElementById('productCard');
    productCard.innerHTML = `
      <div class="product-name">${productData.name}</div>
      <div class="product-desc">${productData.description}</div>
      <div class="product-price">${productData.displayPrice}</div>
    `;

    const subtotal = (productData.price / 100).toFixed(2);
    document.getElementById('subtotal').textContent = '$' + subtotal;
    document.getElementById('total').textContent = '$' + subtotal;
  }

  function showError(message) {
    const errorEl = document.getElementById('errorMessage');
    errorEl.textContent = message;
    errorEl.classList.add('show');
  }

  async function handleSubmit(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const fullName = document.getElementById('fullName').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const processingState = document.getElementById('processingState');
    const successMessage = document.getElementById('successMessage');

    if (!email || !fullName) {
      showError('Please fill in all fields');
      return;
    }

    errorMessage.classList.remove('show');
    processingState.classList.add('show');
    submitBtn.disabled = true;

    try {
      // Create order in database
      const { data, error } = await mdSupabase.from('orders').insert([{
        customer_email: email,
        customer_name: fullName,
        product_slug: productId,
        amount_cents: productData.price,
        status: 'pending',
        created_at: new Date().toISOString()
      }]).select();

      if (error) throw error;

      const orderId = data[0].id;

      // Redirect to payment portal
      window.location.href = 'MD_Payment_Portal.html?order=' + orderId;

    } catch (err) {
      showError(err.message || 'An error occurred. Please try again.');
      processingState.classList.remove('show');
      submitBtn.disabled = false;
    }
  }

  window.addEventListener('load', init);
</script>

</body>
</html>
