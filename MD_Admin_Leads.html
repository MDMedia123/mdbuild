<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Management | MD Build Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a2847;
      --gold: #C1893D;
      --gray-text: #6b7280;
      --paper: #f9fafb;
      --card: #ffffff;
      --card-border: #e5e7eb;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    header {
      background: white;
      padding: 20px 0;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }
    header p {
      font-size: 14px;
      color: var(--gray-text);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--gold);
      color: white;
    }
    .btn-primary:hover {
      background: #b07a2f;
    }
    .btn-secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--card-border);
    }
    .btn-secondary:hover {
      background: var(--paper);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--gray-text);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
    }

    .table-container {
      background: white;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: var(--paper);
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-text);
      border-bottom: 1px solid var(--card-border);
      text-transform: uppercase;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      font-size: 14px;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover {
      background: var(--paper);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active {
      background: #dcfce7;
      color: #166534;
    }
    .badge-inactive {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-text);
    }
    .empty-state p {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Lead Management</h1>
      <p>Free Business Plan Template downloads</p>
    </div>
  </header>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total Downloads</div>
        <div class="value" id="totalDownloads">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Email Signups</div>
        <div class="value" id="totalEmails">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Opted In to Updates</div>
        <div class="value" id="totalOptins">0</div>
      </div>
      <div class="stat-card">
        <div class="label">This Week</div>
        <div class="value" id="weekDownloads">0</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="exportToCSV()">Export as CSV</button>
      <button class="btn btn-secondary" onclick="clearAllLeads()" style="margin-left: auto;">Clear All</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Business</th>
            <th>Updates</th>
            <th>Downloaded</th>
          </tr>
        </thead>
        <tbody id="leadsTable">
          <tr style="height: 200px; text-align: center;">
            <td colspan="5" style="vertical-align: middle; color: var(--gray-text);">
              No leads yet. Share your landing page to start collecting emails.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function loadLeads() {
      const leads = JSON.parse(localStorage.getItem('md_leads') || '[]');
      const tbody = document.getElementById('leadsTable');

      if (leads.length === 0) {
        tbody.innerHTML = `
          <tr style="height: 200px; text-align: center;">
            <td colspan="5" style="vertical-align: middle; color: var(--gray-text);">
              No leads yet. Share your landing page to start collecting emails.
            </td>
          </tr>
        `;
        updateStats(leads);
        return;
      }

      tbody.innerHTML = leads.map((lead, idx) => {
        const date = new Date(lead.downloadedAt);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const badge = lead.updates ? '<span class="badge badge-active">Yes</span>' : '<span class="badge badge-inactive">No</span>';

        return `
          <tr>
            <td>${lead.name || '—'}</td>
            <td><strong>${lead.email}</strong></td>
            <td>${lead.business || '—'}</td>
            <td>${badge}</td>
            <td style="color: var(--gray-text); font-size: 12px;">${dateStr}</td>
          </tr>
        `;
      }).reverse().join('');

      updateStats(leads);
    }

    function updateStats(leads) {
      document.getElementById('totalDownloads').textContent = leads.length;
      document.getElementById('totalEmails').textContent = leads.length;

      const optins = leads.filter(l => l.updates).length;
      document.getElementById('totalOptins').textContent = optins;

      const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
      const weekLeads = leads.filter(l => new Date(l.downloadedAt) > oneWeekAgo).length;
      document.getElementById('weekDownloads').textContent = weekLeads;
    }

    function exportToCSV() {
      const leads = JSON.parse(localStorage.getItem('md_leads') || '[]');
      if (leads.length === 0) {
        alert('No leads to export');
        return;
      }

      const headers = ['Name', 'Email', 'Business', 'Opted In Updates', 'Downloaded At'];
      const rows = leads.map(l => [
        l.name || '',
        l.email,
        l.business || '',
        l.updates ? 'Yes' : 'No',
        new Date(l.downloadedAt).toISOString()
      ]);

      const csv = [
        headers.join(','),
        ...rows.map(r => r.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `md-leads-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }

    function clearAllLeads() {
      if (confirm('Are you sure? This cannot be undone.')) {
        localStorage.removeItem('md_leads');
        loadLeads();
      }
    }

    // Load on page load
    window.addEventListener('load', loadLeads);
  </script>
</body>
</html>
